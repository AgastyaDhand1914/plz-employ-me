name: digest

on:
  schedule:
    - cron: "30 0 * * *"    #00:30 UTC = 6:00 IST, since github actions on free tier deprioritizes, 
                            #to get email at a preferred time, running the workflow earlier :/
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}
        run: python run_digest.py